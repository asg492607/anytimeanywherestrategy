<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Option Analysis Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0e14;
            --panel-bg: #131722;
            --text-color: #d1d4dc;
            --border-color: #2a2e39;
            --primary: #2962ff;
            --primary-hover: #1e53e5;
            --error-color: #f23645;
            --success-color: #089981;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 10% 20%, rgba(41, 98, 255, 0.05) 0px, transparent 50%),
                radial-gradient(at 90% 80%, rgba(8, 153, 129, 0.03) 0px, transparent 50%);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .form-container {
            background: rgba(19, 23, 34, 0.85);
            backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: 0 12px 40px rgba(0,0,0,0.6);
            width: 380px;
            box-sizing: border-box;
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        h2 {
            margin-top: 0;
            margin-bottom: 8px;
            color: white;
            font-size: 22px;
            font-weight: 700;
            text-align: center;
        }
        p.subtitle {
            text-align: center;
            font-size: 13px;
            color: #787b86;
            margin-top: 0;
            margin-bottom: 28px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-size: 12px;
            font-weight: 500;
            color: #787b86;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        input {
            width: 100%;
            padding: 12px;
            background: rgba(11, 14, 20, 0.8);
            border: 1px solid var(--border-color);
            color: white;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            box-sizing: border-box;
            transition: all 0.2s;
        }
        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(41, 98, 255, 0.2);
        }
        .alert {
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            line-height: 1.4;
        }
        .alert-error {
            background: rgba(242, 54, 69, 0.1);
            border-left: 4px solid var(--error-color);
            color: #f26875;
        }
        .alert-success {
            background: rgba(8, 153, 129, 0.1);
            border-left: 4px solid var(--success-color);
            color: #4cdbaf;
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.2s;
        }
        .btn:hover {
            background: var(--primary-hover);
        }
        .footer-link {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: #787b86;
        }
        .footer-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }
        .footer-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Welcome Back</h2>
        <p class="subtitle">Option Co-Movement Analysis Engine</p>

        {% if error %}
        <div class="alert alert-error">
            {{ error }}
        </div>
        {% endif %}

        {% if registered %}
        <div class="alert alert-success">
            Registration successful! Please log in with your credentials.
        </div>
        {% endif %}

        <form action="/login" method="POST">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" required autocomplete="email" placeholder="name@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required autocomplete="current-password" placeholder="••••••••">
            </div>
            <button type="submit" class="btn">Log In</button>
        </form>

        <div class="footer-link">
            Don't have an account? <a href="/register">Register here</a>
        </div>
    </div>
</body>
</html>
