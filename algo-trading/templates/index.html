<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automated Analysis Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0e14;
            --panel-bg: #131722;
            --text-color: #d1d4dc;
            --border-color: #2a2e39;
            --primary: #2962ff;
            --primary-hover: #1e53e5;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .form-container {
            background: var(--panel-bg);
            padding: 40px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            width: 400px;
        }
        h2 {
            margin-top: 0;
            margin-bottom: 24px;
            color: white;
            font-size: 20px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            color: #787b86;
        }
        input, select {
            width: 100%;
            padding: 10px;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            color: white;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            box-sizing: border-box;
        }
        input:focus, select:focus {
            border-color: var(--primary);
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }
        .btn:hover {
            background: var(--primary-hover);
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Option Co-Movement Analysis Engine</h2>
        <form action="/dashboard" method="GET">
            <div class="form-group">
                <label>Broker Selection</label>
                <select name="broker">
                    <option value="angelone">Angel One</option>
                </select>
            </div>
            <div class="form-group">
                <label>Execution Date</label>
                <input type="date" name="date" required id="date-input">
            </div>
            <div class="form-group">
                <label>Underlying Symbol</label>
                <input type="text" name="underlying" value="SENSEX" readonly>
            </div>
            <div class="form-group">
                <label>Call Option Symbol</label>
                <input type="text" name="ce_symbol" placeholder="e.g. SENSEX2670276900CE" required value="SENSEX2670276900CE">
            </div>
            <div class="form-group">
                <label>Put Option Symbol</label>
                <input type="text" name="pe_symbol" placeholder="e.g. SENSEX2670276900PE" required value="SENSEX2670276900PE">
            </div>
            <div class="form-group">
                <label>Strategy Configuration</label>
                <select name="strategy">
                    <option value="institutional">Institutional Weekly Reversal</option>
                </select>
            </div>
            <button type="submit" class="btn">Run Analysis</button>
        </form>
    </div>
    <script>
        document.getElementById('date-input').valueAsDate = new Date();
    </script>
</body>
</html>
